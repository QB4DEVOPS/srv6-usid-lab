lab:
  description: |
    Part 3 — SRv6 uSID SR-TE Traffic Engineering.
    Same 8-node topology as Part 1, with SR-TE policy added to P1 (IOS-XR head-end).
    Policy: segment list [P4 fcbb:bb00:4:: -> PE7 fcbb:bb00:7::], color 100.
    Compressed 2-hop uSID: fcbb:bb00:4:7:: (the uSID compression proof packet).
  notes: |
    Part 3 builds on Part 1. No L3VPN required.
    P1 has segment-routing traffic-eng configured with one segment list and policy.
    Paste segment-list and policy as SEPARATE config blocks on P1 in CML
    (IOS XRv may reject policy until segment-list is committed first).
    Proof: ping fcbb:bb00:4:7:: from PE5 while PCAP runs on P1-P4 and P4-PE7 links.
    P1-P4 PCAP dst = fcbb:bb00:4:7:: (2-hop compressed).
    P4-PE7 PCAP dst = fcbb:bb00:7:: (P4 shifted the pointer).
  timestamp: 1784252880.562071
  title: Quisted SRv6 uSID — Part 3 SR-TE Solution
  version: 0.1.0
nodes:
  - id: n0
    label: P1
    node_definition: iosxrv9000
    x: 0
    y: -100
    configuration: |-
      hostname P1
      logging console disable
      service timestamps log datetime msec
      service timestamps debug datetime msec
      domain name lab.local
      domain lookup disable
      ssh server v2
      username cisco
       group root-lr
       group cisco-support
       secret Cisc01@3
      !
      line console
       exec-timeout 0 0
       login authentication default
      !
      line default
       exec-timeout 0 0
       login authentication default
      !
      aaa authentication login default local
      !
      vrf Mgmt-intf
       address-family ipv4 unicast
       !
      !
      interface MgmtEth0/RP0/CPU0/0
       vrf Mgmt-intf
       ipv4 address dhcp
       no shutdown
      !
      ssh server vrf Mgmt-intf
      !

      interface Loopback0
       ipv6 address fc00:0:1::1/128
       ipv6 address fe80:0:1::1 link-local
       cdp
      !
      interface GigabitEthernet0/0/0/0
       description to P2
       ipv6 address fe80:0:1::1 link-local
       ipv6 address 2001:12::1/64
       cdp
       no shutdown
      !
      interface GigabitEthernet0/0/0/1
       description to P3
       ipv6 address fe80:0:1::1 link-local
       ipv6 address 2001:13::1/64
       cdp
       no shutdown
      !
      interface GigabitEthernet0/0/0/2
       description to P4
       ipv6 address fe80:0:1::1 link-local
       ipv6 address 2001:14::1/64
       cdp
       no shutdown
      !
      interface GigabitEthernet0/0/0/3
       description to PE5
       ipv6 address fe80:0:1::1 link-local
       ipv6 address 2001:15::1/64
       cdp
       no shutdown
      !
      interface GigabitEthernet0/0/0/4
       description to PE6
       ipv6 address fe80:0:1::1 link-local
       ipv6 address 2001:16::1/64
       cdp
       no shutdown
      !
      segment-routing
       srv6
        encapsulation
         source-address fc00:0:1::1
        !
        locators
         locator MAIN
          prefix fcbb:bb00:0001::/48
          micro-segment behavior unode psp-usd
         !
        !
       !
       traffic-eng
        segment-lists
         srv6
          sid-format usid-f3216
         !
         segment-list via-p4-to-pe7
          srv6
           index 10 sid fcbb:bb00:0004::
           index 20 sid fcbb:bb00:0007::
          !
         !
        !
        policy to-pe7-via-p4
         color 100 end-point ipv6 fcbb:bb00:0007::
         srv6
          locator MAIN
         !
         candidate-paths
          preference 100
           explicit segment-list via-p4-to-pe7
           !
          !
         !
        !
       !
      !
      router isis 100
       is-type level-2-only
       net 49.0001.0000.0000.0001.00
       address-family ipv6 unicast
        metric-style wide
        segment-routing srv6
         locator MAIN
        !
       !
       interface Loopback0
        passive
        address-family ipv6 unicast
        !
       !
       interface GigabitEthernet0/0/0/0
        point-to-point
        address-family ipv6 unicast
        !
       !
       interface GigabitEthernet0/0/0/1
        point-to-point
        address-family ipv6 unicast
        !
       !
       interface GigabitEthernet0/0/0/2
        point-to-point
        address-family ipv6 unicast
        !
       !
       interface GigabitEthernet0/0/0/3
        point-to-point
        address-family ipv6 unicast
        !
       !
       interface GigabitEthernet0/0/0/4
        point-to-point
        address-family ipv6 unicast
        !
       !
      !
      end
    interfaces:
      - id: i0
        label: Loopback0
        type: loopback
      - id: i1
