       ip address dhcp
       no cdp enable
       no shutdown
      !
      interface GigabitEthernet4
       description to CE11 (CUST-A static non-speaker)
       vrf forwarding CUST-A
       ip address 10.11.8.2 255.255.255.252
       no shutdown
      !
      interface GigabitEthernet5
       description to CE12 (CUST-B static non-speaker)
       vrf forwarding CUST-B
       ip address 10.12.8.2 255.255.255.252
       no shutdown
      !
      no cdp run
      cdp run
      !
      crypto key generate rsa general-keys modulus 3072
      ip ssh version 2
      ip ssh source-interface GigabitEthernet3
      line vty 0 15
       exec-timeout 0 0
       login local
       transport input ssh
      !
      segment-routing srv6
       encapsulation
        source-address fc00:0:8::1
       !
       locators
        locator MAIN
         format usid-f3216
         prefix fcbb:bb00:0008::/48
       !
      !
      router isis 100
       net 49.0001.0000.0000.0008.00
       is-type level-2-only
       metric-style wide
       address-family ipv6 unicast
        multi-topology
        segment-routing srv6
         locator MAIN
        !
       !
      !
      ip route vrf CUST-A 10.11.0.1 255.255.255.255 10.11.8.1
      ip route vrf CUST-B 10.12.0.1 255.255.255.255 10.12.8.1
      !
      router bgp 65000
       bgp router-id 8.8.8.8
       bgp log-neighbor-changes
       no bgp default ipv4-unicast
       !
       neighbor fc00:0:5::1 remote-as 65000
       neighbor fc00:0:5::1 update-source Loopback0
       neighbor fc00:0:6::1 remote-as 65000
       neighbor fc00:0:6::1 update-source Loopback0
       neighbor fc00:0:7::1 remote-as 65000
       neighbor fc00:0:7::1 update-source Loopback0
       !
       address-family vpnv4 unicast
        neighbor fc00:0:5::1 activate
        neighbor fc00:0:5::1 send-community extended
        neighbor fc00:0:6::1 activate
        neighbor fc00:0:6::1 send-community extended
        neighbor fc00:0:7::1 activate
        neighbor fc00:0:7::1 send-community extended
        segment-routing srv6
        locator MAIN
       exit-address-family
       !
       address-family ipv4 vrf CUST-A
        segment-routing srv6
        alloc mode per-vrf
        redistribute connected
        redistribute static
       exit-address-family
       !
       address-family ipv4 vrf CUST-B
        segment-routing srv6
        alloc mode per-vrf
        redistribute connected
        redistribute static
       exit-address-family
      !
      end
