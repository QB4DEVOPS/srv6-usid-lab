lab:
  description: |
    Part 4 — SRv6 L3VPN with CE routers, dual-homed, showing eBGP vs non-speaker (static) CE-PE.
    Left  — CE9 (CUST-A AS 65100) and CE10 (CUST-B AS 65200) dual-homed to PE5+PE6 via eBGP.
    Right — CE11 (CUST-A) and CE12 (CUST-B) dual-homed to PE7+PE8 via static routes only (no BGP).
    All 4 PEs carry both CUST-A (RD/RT 65000:100) and CUST-B (RD/RT 65000:200).
    CE routers are IOSv — no SRv6 config at all. SRv6 encap/decap is transparent at the PE boundary.
  notes: |
    Requires iosxrv9000, cat8000v, and iosv node definitions in CML 2.9 or 2.10.
    Left-side CEs: eBGP between CE and PE inside VRF. CE advertises Lo0 prefix.
    Right-side CEs: no routing protocol. CE has a static default route to PE.
      PE7/PE8 have ip route vrf CUST-x for each CE prefix, redistributed into BGP.
    This is the "non-speaker" pattern: the PE manages CE reachability via static+redistribute.
    CE routers are accessed via CML console (no OOB management wired).
    Loopback100 on each PE (from Part 2) is retained as a PE-local simulated prefix.
  timestamp: 1784252880.562071
  title: Quisted SRv6 uSID — Part 4 CE Solution
  version: 0.1.0
nodes:
  - id: n0
    label: P1
    node_definition: iosxrv9000
    x: 0
    y: -100
    configuration: |-
      hostname P1
      logging console disable
      service timestamps log datetime msec
      service timestamps debug datetime msec
      domain name lab.local
      domain lookup disable
      ssh server v2
      username cisco
       group root-lr
       group cisco-support
       secret Cisc01@3
      !
      line console
       exec-timeout 0 0
       login authentication default
      !
      line default
       exec-timeout 0 0
       login authentication default
      !
      aaa authentication login default local
      !
      vrf Mgmt-intf
       address-family ipv4 unicast
       !
      !
      interface MgmtEth0/RP0/CPU0/0
       vrf Mgmt-intf
       ipv4 address dhcp
       no shutdown
      !
      ssh server vrf Mgmt-intf
      !

      interface Loopback0
       ipv6 address fc00:0:1::1/128
       ipv6 address fe80:0:1::1 link-local
       cdp
      !
      interface GigabitEthernet0/0/0/0
       description to P2
       ipv6 address fe80:0:1::1 link-local
       ipv6 address 2001:12::1/64
       cdp
       no shutdown
      !
      interface GigabitEthernet0/0/0/1
       description to P3
       ipv6 address fe80:0:1::1 link-local
       ipv6 address 2001:13::1/64
       cdp
       no shutdown
      !
      interface GigabitEthernet0/0/0/2
       description to P4
       ipv6 address fe80:0:1::1 link-local
       ipv6 address 2001:14::1/64
       cdp
       no shutdown
      !
      interface GigabitEthernet0/0/0/3
       description to PE5
       ipv6 address fe80:0:1::1 link-local
       ipv6 address 2001:15::1/64
       cdp
       no shutdown
      !
      interface GigabitEthernet0/0/0/4
       description to PE6
       ipv6 address fe80:0:1::1 link-local
       ipv6 address 2001:16::1/64
       cdp
       no shutdown
      !
      segment-routing
       srv6
        encapsulation
         source-address fc00:0:1::1
        !
        locators
         locator MAIN
          prefix fcbb:bb00:0001::/48
          micro-segment behavior unode psp-usd
         !
        !
       !
      !
      router isis 100
       is-type level-2-only
       net 49.0001.0000.0000.0001.00
       address-family ipv6 unicast
        metric-style wide
        segment-routing srv6
         locator MAIN
        !
       !
       interface Loopback0
        passive
        address-family ipv6 unicast
        !
       !
       interface GigabitEthernet0/0/0/0
        point-to-point
        address-family ipv6 unicast
        !
       !
       interface GigabitEthernet0/0/0/1
        point-to-point
        address-family ipv6 unicast
        !
       !
       interface GigabitEthernet0/0/0/2
        point-to-point
        address-family ipv6 unicast
        !
       !
       interface GigabitEthernet0/0/0/3
        point-to-point
        address-family ipv6 unicast
        !
       !
       interface GigabitEthernet0/0/0/4
        point-to-point
        address-family ipv6 unicast
        !
       !
      !
      end
    interfaces:
