lab:
  description: |
    Part 5 — SRv6 Interworking Gateway (IGW) for L3VPN.
    IGW sits at the boundary of the SRv6 domain (IS-IS + SRv6 locator fcbb:bb00:9::/48)
    and the MPLS domain (OSPF 1 + SR-MPLS).
    IGW allocates both an SRv6 End.DT4 SID (for SRv6 PEs) and an MPLS VPN label
    (for MPE1) for VRF CUST-A — translating transport at the domain boundary.
    CE routers are not required: MPE1 uses Loopback100 as a simulated MPLS-side customer prefix.
  notes: |
    Requires iosxrv9000 and cat8000v node definitions in CML 2.9 or 2.10.
    P3 has an extra Gi0/0/0/5 interface toward IGW; IGW joins SRv6 IS-IS domain.
    PE5-PE8 add fc00:0:9::1 (IGW SRv6 loopback) as 5th iBGP VPNv4 neighbor.
    IGW: IS-IS 100 (SRv6) + OSPF 1 (MPLS) + BGP iBGP to all SRv6 PEs and MPE1.
    IGW VRF CUST-A uses both segment-routing srv6 and segment-routing mpls (per-vrf).
    MP1: OSPF 1 + SR-MPLS, no VRF. SR-MPLS SRGB 16000-23999.
    MPE1: OSPF 1 + SR-MPLS + VRF CUST-A + BGP iBGP with IGW.
    Proof path: CE (left) -> PE5/PE6 (SRv6) -> P core -> IGW -> MP1 -> MPE1 -> Loopback100
    Verify: show segment-routing srv6 sid on IGW (End.DT4 for CUST-A present)
            show mpls forwarding on IGW (VPN label for CUST-A present)
            show bgp vpnv4 unicast vrf CUST-A on IGW (routes from both domains visible)
  timestamp: 1784252880.562071
  title: Quisted SRv6 uSID — Part 5 IGW Solution
  version: 0.1.0
nodes:
  - id: n0
    label: P1
    node_definition: iosxrv9000
    x: 0
    y: -100
    configuration: |-
      hostname P1
      logging console disable
      service timestamps log datetime msec
      service timestamps debug datetime msec
      domain name lab.local
      domain lookup disable
      ssh server v2
      username cisco
       group root-lr
       group cisco-support
       secret Cisc01@3
      !
      line console
       exec-timeout 0 0
       login authentication default
      !
      line default
       exec-timeout 0 0
       login authentication default
      !
      aaa authentication login default local
      !
      vrf Mgmt-intf
       address-family ipv4 unicast
       !
      !
      interface MgmtEth0/RP0/CPU0/0
       vrf Mgmt-intf
       ipv4 address dhcp
       no shutdown
      !
      ssh server vrf Mgmt-intf
      !

      interface Loopback0
       ipv6 address fc00:0:1::1/128
       ipv6 address fe80:0:1::1 link-local
       cdp
      !
      interface GigabitEthernet0/0/0/0
       description to P2
       ipv6 address fe80:0:1::1 link-local
       ipv6 address 2001:12::1/64
       cdp
       no shutdown
      !
      interface GigabitEthernet0/0/0/1
       description to P3
       ipv6 address fe80:0:1::1 link-local
       ipv6 address 2001:13::1/64
       cdp
       no shutdown
      !
      interface GigabitEthernet0/0/0/2
       description to P4
       ipv6 address fe80:0:1::1 link-local
       ipv6 address 2001:14::1/64
       cdp
       no shutdown
      !
      interface GigabitEthernet0/0/0/3
       description to PE5
       ipv6 address fe80:0:1::1 link-local
       ipv6 address 2001:15::1/64
       cdp
       no shutdown
      !
      interface GigabitEthernet0/0/0/4
       description to PE6
       ipv6 address fe80:0:1::1 link-local
       ipv6 address 2001:16::1/64
       cdp
       no shutdown
      !
      segment-routing
       srv6
        encapsulation
         source-address fc00:0:1::1
        !
        locators
         locator MAIN
          prefix fcbb:bb00:0001::/48
          micro-segment behavior unode psp-usd
         !
        !
       !
      !
      router isis 100
       is-type level-2-only
       net 49.0001.0000.0000.0001.00
       address-family ipv6 unicast
        metric-style wide
        segment-routing srv6
         locator MAIN
        !
       !
       interface Loopback0
        passive
        address-family ipv6 unicast
        !
       !
       interface GigabitEthernet0/0/0/0
        point-to-point
        address-family ipv6 unicast
        !
       !
       interface GigabitEthernet0/0/0/1
        point-to-point
        address-family ipv6 unicast
        !
       !
       interface GigabitEthernet0/0/0/2
        point-to-point
        address-family ipv6 unicast
        !
       !
       interface GigabitEthernet0/0/0/3
        point-to-point
        address-family ipv6 unicast
        !
       !
       interface GigabitEthernet0/0/0/4
        point-to-point
        address-family ipv6 unicast
        !
       !
      !
      end
